model_type: lightgbm
test_weeks: 6
cv_val_weeks: 6
num_boost_round: 1000
early_stopping_rounds: 50
params:
  learning_rate: 0.05
  num_leaves: 63
  min_data_in_leaf: 50
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 1
# Registered to the MLflow Model Registry: fast to retrain, and Phase 2 showed
# it's within noise of the LSTM globally while being far cheaper to serve.
register_model: true
